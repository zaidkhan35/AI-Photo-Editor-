<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Photo Editor</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header>
    <div class="logo">
      <span class="logo-icon">◈</span>
      <span class="logo-text">PixelMind</span>
      <span class="logo-tag">AI Photo Editor</span>
    </div>
    <div class="header-actions">
      <span id="status-badge" class="badge badge-idle">No image loaded</span>
      <button id="btn-download" class="btn-primary" disabled>↓ Download</button>
    </div>
  </header>

  <main>

    <!-- LEFT CONTROLS -->
    <aside class="panel-controls">

      <div class="upload-zone" id="upload-zone">
        <input type="file" id="file-input" accept="image/*" hidden />
        <div class="upload-content">
          <span class="upload-icon">⊕</span>
          <p class="upload-title">Drop image here</p>
          <p class="upload-sub">or click to browse</p>
        </div>
      </div>

      <div class="phase-tabs">
        <button class="tab active" data-phase="1">Basic</button>
        <button class="tab" data-phase="2">Effects</button>
        <button class="tab" data-phase="3">Faces</button>
        <button class="tab" data-phase="4">AI</button>
        <button class="tab" data-phase="5">Text</button>
      </div>

      <!-- PHASE 1 -->
      <div class="phase-panel active" id="phase-1">
        <p class="phase-label">BASIC ADJUSTMENTS</p>

        <div class="control-group">
          <label>Brightness <span class="val" id="val-brightness">100</span></label>
          <input type="range" id="brightness" min="0" max="200" value="100" />
        </div>
        <div class="control-group">
          <label>Contrast <span class="val" id="val-contrast">10</span></label>
          <input type="range" id="contrast" min="1" max="40" value="10" />
        </div>
        <div class="control-group">
          <label>Blur <span class="val" id="val-blur">1</span></label>
          <input type="range" id="blur" min="1" max="51" value="1" />
        </div>

        <div class="toggle-row">
          <label>Sharpen</label>
          <label class="toggle">
            <input type="checkbox" id="sharpen" />
            <span class="slider-toggle"></span>
          </label>
        </div>
        <div class="toggle-row">
          <label>Grayscale</label>
          <label class="toggle">
            <input type="checkbox" id="grayscale" />
            <span class="slider-toggle"></span>
          </label>
        </div>

        <p class="phase-label" style="margin-top:18px">TRANSFORM</p>

        <div class="control-group">
          <label>Scale <span class="val" id="val-scale">100</span>%</label>
          <input type="range" id="scale" min="10" max="300" value="100" />
        </div>
        <div class="control-group">
          <label>Rotate <span class="val" id="val-rotate">0</span>°</label>
          <input type="range" id="rotate" min="0" max="360" value="0" />
        </div>
        <div class="control-group">
          <label>Flip</label>
          <select id="flip" class="select">
            <option value="0">None</option>
            <option value="1">Horizontal</option>
            <option value="2">Vertical</option>
            <option value="3">Both</option>
          </select>
        </div>

        <p class="phase-label" style="margin-top:18px">CROP</p>
        <div class="control-grid-2">
          <div class="control-group">
            <label>X <span class="val" id="val-crop_x">0</span></label>
            <input type="range" id="crop_x" min="0" max="2000" value="0" />
          </div>
          <div class="control-group">
            <label>Y <span class="val" id="val-crop_y">0</span></label>
            <input type="range" id="crop_y" min="0" max="2000" value="0" />
          </div>
          <div class="control-group">
            <label>W <span class="val" id="val-crop_w">0</span></label>
            <input type="range" id="crop_w" min="0" max="4000" value="0" />
          </div>
          <div class="control-group">
            <label>H <span class="val" id="val-crop_h">0</span></label>
            <input type="range" id="crop_h" min="0" max="4000" value="0" />
          </div>
        </div>
      </div>

      <!-- PHASE 2 -->
      <div class="phase-panel" id="phase-2">
        <p class="phase-label">ARTISTIC EFFECTS <span class="hint">0 = off</span></p>

        <div class="control-group">
          <label>Cartoon <span class="val" id="val-cartoon">0</span></label>
          <input type="range" id="cartoon" min="0" max="100" value="0" />
        </div>
        <div class="control-group">
          <label>Sketch B&W <span class="val" id="val-sketch_bw">0</span></label>
          <input type="range" id="sketch_bw" min="0" max="100" value="0" />
        </div>
        <div class="control-group">
          <label>Sketch Color <span class="val" id="val-sketch_color">0</span></label>
          <input type="range" id="sketch_color" min="0" max="100" value="0" />
        </div>
        <div class="control-group">
          <label>Stylize <span class="val" id="val-stylize">0</span></label>
          <input type="range" id="stylize" min="0" max="100" value="0" />
        </div>
        <div class="control-group">
          <label>Edges <span class="val" id="val-edges">0</span></label>
          <input type="range" id="edges" min="0" max="100" value="0" />
        </div>
        <div class="control-group">
          <label>Emboss <span class="val" id="val-emboss">0</span></label>
          <input type="range" id="emboss" min="0" max="100" value="0" />
        </div>
        <div class="control-group">
          <label>Sepia <span class="val" id="val-sepia">0</span></label>
          <input type="range" id="sepia" min="0" max="100" value="0" />
        </div>
      </div>

      <!-- PHASE 3 -->
      <div class="phase-panel" id="phase-3">
        <p class="phase-label">FACE DETECTION</p>

        <div class="control-group">
          <label>Face Mode</label>
          <select id="face_mode" class="select">
            <option value="0">Off</option>
            <option value="1">Bounding Boxes</option>
            <option value="2">Blur Faces</option>
            <option value="3">Pixelate Faces</option>
            <option value="4">Highlight Faces</option>
          </select>
        </div>
        <div class="control-group">
          <label>Min Neighbors <span class="val" id="val-min_neighbors">5</span></label>
          <input type="range" id="min_neighbors" min="1" max="20" value="5" />
        </div>
        <div class="control-group">
          <label>Scale Factor ×10 <span class="val" id="val-scale_factor_x10">12</span></label>
          <input type="range" id="scale_factor_x10" min="11" max="20" value="12" />
        </div>

        <div class="face-count-box">
          <span class="face-count-num" id="face-count">—</span>
          <span class="face-count-label">faces detected</span>
        </div>
      </div>

      <!-- PHASE 4 -->
      <div class="phase-panel" id="phase-4">
        <p class="phase-label">AI FEATURES</p>

        <div class="toggle-row">
          <label>Remove Background</label>
          <label class="toggle">
            <input type="checkbox" id="bg_remove" />
            <span class="slider-toggle"></span>
          </label>
        </div>
        <div class="control-group">
          <label>Denoise <span class="val" id="val-denoise">0</span></label>
          <input type="range" id="denoise" min="0" max="100" value="0" />
        </div>
        <div class="control-group">
          <label>Auto Enhance <span class="val" id="val-auto_enhance">0</span></label>
          <input type="range" id="auto_enhance" min="0" max="100" value="0" />
        </div>
        <div class="control-group">
          <label>Super Resolution <span class="val" id="val-super_res">0</span></label>
          <input type="range" id="super_res" min="0" max="100" value="0" />
        </div>
      </div>

      <!-- PHASE 5 -->
      <div class="phase-panel" id="phase-5">
        <p class="phase-label">TEXT OVERLAY</p>

        <div class="toggle-row">
          <label>Enable Text</label>
          <label class="toggle">
            <input type="checkbox" id="text_on" />
            <span class="slider-toggle"></span>
          </label>
        </div>
        <div class="control-group">
          <label>Text Content</label>
          <input type="text" id="text_content" class="text-input" placeholder="Your text here..." value="Hello World" />
        </div>
        <div class="control-grid-2">
          <div class="control-group">
            <label>X % <span class="val" id="val-text_x">10</span></label>
            <input type="range" id="text_x" min="0" max="100" value="10" />
          </div>
          <div class="control-group">
            <label>Y % <span class="val" id="val-text_y">10</span></label>
            <input type="range" id="text_y" min="0" max="100" value="10" />
          </div>
        </div>
        <div class="control-group">
          <label>Font Size <span class="val" id="val-text_size">40</span></label>
          <input type="range" id="text_size" min="10" max="200" value="40" />
        </div>

        <p class="phase-label" style="margin-top:14px">TEXT COLOR</p>
        <div class="control-grid-3">
          <div class="control-group">
            <label>R <span class="val" id="val-text_r">255</span></label>
            <input type="range" id="text_r" min="0" max="255" value="255" class="range-r" />
          </div>
          <div class="control-group">
            <label>G <span class="val" id="val-text_g">255</span></label>
            <input type="range" id="text_g" min="0" max="255" value="255" class="range-g" />
          </div>
          <div class="control-group">
            <label>B <span class="val" id="val-text_b">255</span></label>
            <input type="range" id="text_b" min="0" max="255" value="255" class="range-b" />
          </div>
        </div>
        <div class="color-preview" id="color-preview"></div>

        <p class="phase-label" style="margin-top:18px">QUALITY</p>
        <div class="control-group">
          <label>Enhance Quality <span class="val" id="val-enhance_qual">0</span></label>
          <input type="range" id="enhance_qual" min="0" max="100" value="0" />
        </div>
      </div>

      <div class="action-row">
        <button id="btn-reset" class="btn-ghost">Reset All</button>
        <button id="btn-apply" class="btn-primary" disabled>Apply</button>
      </div>

    </aside>

    <!-- RIGHT PREVIEW -->
    <section class="panel-preview">

      <div class="preview-header">
        <div class="preview-tabs">
          <button class="ptab active" data-view="split">Split</button>
          <button class="ptab" data-view="original">Original</button>
          <button class="ptab" data-view="result">Result</button>
        </div>
        <div class="preview-info" id="preview-info">—</div>
      </div>

      <div class="canvas-area">
        <div class="empty-state" id="empty-state">
          <span class="empty-icon">⊕</span>
          <p>Upload an image to get started</p>
        </div>

        <div class="split-view hidden" id="split-view">
          <div class="img-wrap">
            <span class="img-label">ORIGINAL</span>
            <img id="img-original" src="" alt="Original" />
          </div>
          <div class="divider-line"></div>
          <div class="img-wrap">
            <span class="img-label">RESULT</span>
            <img id="img-result" src="" alt="Result" />
          </div>
        </div>

        <div class="single-view hidden" id="view-original">
          <img id="img-original-single" src="" alt="Original" />
        </div>
        <div class="single-view hidden" id="view-result">
          <img id="img-result-single" src="" alt="Result" />
        </div>

        <div class="spinner hidden" id="spinner">
          <div class="spin-ring"></div>
          <p>Processing…</p>
        </div>
      </div>

    </section>

  </main>

  <script src="app.js"></script>
</body>
</html>
